<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Journal — spashuev</title>
<style>
:root{--bg:#000;--card:#1c1c1e;--hover:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--text1:#f5f5f7;--text2:rgba(255,255,255,0.7);--text3:rgba(255,255,255,0.4);--green:#34c759;--red:#ff453a;--blue:#0a84ff;--purple:#5e5ce6;--orange:#ff9f0a;--yellow:#ffd60a;--pink:#ff375f}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;background:var(--bg);color:var(--text1);-webkit-font-smoothing:antialiased;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:3px}
input,select,textarea,button{font-family:inherit}
.hdr{padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);backdrop-filter:blur(20px);position:sticky;top:0;z-index:50;background:rgba(0,0,0,0.85);flex-wrap:wrap;gap:10px}
.hdr-l{display:flex;align-items:center;gap:16px}.logo{font-size:18px;font-weight:700;letter-spacing:-0.02em}
.nav{display:flex;gap:2px;background:var(--card);border-radius:10px;padding:2px}
.nb{font-size:11px;font-weight:500;padding:6px 12px;border-radius:8px;border:none;cursor:pointer;transition:all 0.2s;background:transparent;color:var(--text3)}
.nb.a{background:rgba(255,255,255,0.12);color:var(--text1)}
.hdr-r{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.btn{font-size:12px;font-weight:600;padding:7px 14px;border-radius:10px;border:none;cursor:pointer;transition:all 0.15s}
.btn:hover{filter:brightness(1.1)}.btn-b{background:var(--blue);color:#fff}.btn-p{background:var(--purple);color:#fff}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--text2)}.btn-r{background:rgba(255,69,58,0.08);border:1px solid rgba(255,69,58,0.3);color:var(--red)}
.ctr{max-width:1280px;margin:0 auto;padding:20px 24px}
.sr{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.sc{background:var(--card);border-radius:14px;padding:14px 18px;border:1px solid var(--border);flex:1;min-width:130px}
.sl_c{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px}
.sv{font-size:20px;font-weight:700;letter-spacing:-0.02em;font-variant-numeric:tabular-nums}
.ss_c{font-size:10px;color:var(--text3);margin-top:2px}
.g{color:var(--green)}.r{color:var(--red)}.bl{color:var(--blue)}.pu{color:var(--purple)}.or{color:var(--orange)}
.cd{background:var(--card);border-radius:14px;padding:18px;border:1px solid var(--border);margin-bottom:12px}
.ct{font-size:15px;font-weight:600;margin-bottom:12px}
.fl_c{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.fs_c{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text1);font-size:12px;outline:none}
.fs_c option{background:#1c1c1e}.fi_c{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text1);font-size:12px;outline:none}
.fi_c:focus,.fs_c:focus{border-color:var(--blue)}
.th-h{display:grid;grid-template-columns:85px 62px 44px 80px 80px 90px 65px 60px 1fr 26px;padding:8px 12px;border-bottom:1px solid var(--border);gap:5px}
.th{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.04em}
.trow{display:grid;grid-template-columns:85px 62px 44px 80px 80px 90px 65px 60px 1fr 26px;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.12s;gap:5px}
.trow:hover{background:var(--hover)}
.sbdg{font-size:10px;font-weight:600;padding:2px 6px;border-radius:5px;text-align:center}
.sbl{background:rgba(52,199,89,0.1);color:var(--green)}.sbs{background:rgba(255,69,58,0.1);color:var(--red)}
.tgb{font-size:9px;font-weight:600;padding:1px 6px;border-radius:100px;background:rgba(94,92,230,0.12);color:var(--purple);margin-right:3px}
.tn{font-variant-numeric:tabular-nums}
.star{font-size:12px;color:var(--text3);cursor:pointer}.star.on{color:var(--yellow)}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.chd{text-align:center;font-size:10px;font-weight:600;color:var(--text3);padding:6px 0}
.ccl{border-radius:8px;padding:6px 3px;text-align:center;min-height:54px;display:flex;flex-direction:column;justify-content:center}
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(8px)}
.md{background:var(--card);border-radius:18px;border:1px solid var(--border);width:100%;max-width:720px;max-height:92vh;overflow-y:auto;box-shadow:0 25px 80px rgba(0,0,0,0.5)}
.md-h{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border)}
.md-x{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;color:var(--text2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.md-x:hover{background:rgba(255,255,255,0.2)}
.md-b{padding:20px}
.dg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.di{background:var(--bg);border-radius:10px;padding:10px 12px}
.dl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:2px}
.dv{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
.dv2{font-size:12px;font-weight:600;font-variant-numeric:tabular-nums}
.tw{display:flex;gap:4px;flex-wrap:wrap}
.tgs{font-size:11px;font-weight:500;padding:4px 10px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all 0.15s}
.tgs.a{border-color:var(--purple);background:rgba(94,92,230,0.12);color:var(--purple)}
.tgs.emo{border-color:var(--orange);color:var(--orange)}.tgs.emo.a{background:rgba(255,159,10,0.12)}
.tgs.mis{border-color:var(--pink);color:var(--pink)}.tgs.mis.a{background:rgba(255,55,95,0.12)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}.ff{display:flex;flex-direction:column;gap:4px}
.flab{font-size:11px;font-weight:600;color:var(--text3)}.fin{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text1);font-size:13px;outline:none;width:100%}
.fin:focus{border-color:var(--blue)}.fsp{grid-column:span 2}
.eq-svg{width:100%;height:120px}
.sym-r{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--bg);border-radius:10px;margin-bottom:6px}
.empty{text-align:center;padding:80px 20px}
.bk{position:fixed;top:14px;left:14px;color:var(--text3);text-decoration:none;font-size:12px;font-weight:600;z-index:60}.bk:hover{color:var(--text1)}
.rbar{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.rbar-l{font-size:11px;color:var(--text2);width:55px;text-align:right;flex-shrink:0}
.rbar-f{height:22px;border-radius:5px;min-width:2px;transition:width 0.5s;display:flex;align-items:center;padding-left:7px;font-size:10px;font-weight:600;color:#fff}
.rbar-v{font-size:11px;font-weight:600;width:65px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}
.je{background:var(--bg);border-radius:10px;padding:14px;margin-bottom:8px;border:1px solid var(--border)}
.pb-c{background:var(--bg);border-radius:10px;padding:14px;margin-bottom:8px;border:1px solid var(--border);cursor:pointer;transition:border-color 0.2s}
.pb-c:hover{border-color:var(--purple)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.scr{width:80px;height:80px;position:relative;display:inline-flex;align-items:center;justify-content:center}
.scr svg{position:absolute;transform:rotate(-90deg)}.scr-n{font-size:22px;font-weight:800;z-index:1}
.img-prev{width:100%;max-height:200px;object-fit:contain;border-radius:8px;margin-top:8px;border:1px solid var(--border)}
@media(max-width:768px){.hdr{padding:10px 12px}.ctr{padding:12px}.th-h,.trow{grid-template-columns:65px 50px 40px 1fr 24px}.hm{display:none}.dg{grid-template-columns:1fr 1fr}.fg{grid-template-columns:1fr}.fsp{grid-column:span 1}.g2{grid-template-columns:1fr}}
</style>
</head>

<div id="app"></div>
<script>
const TV={ES:{t:.25,pv:50,n:"E-mini S&P"},MES:{t:.25,pv:5,n:"Micro S&P"},NQ:{t:.25,pv:20,n:"E-mini Nasdaq"},MNQ:{t:.25,pv:2,n:"Micro Nasdaq"},YM:{t:1,pv:5,n:"E-mini Dow"},MYM:{t:1,pv:.5,n:"Micro Dow"},RTY:{t:.1,pv:50,n:"Russell"},M2K:{t:.1,pv:5,n:"Micro Russell"},CL:{t:.01,pv:1000,n:"Crude Oil"},GC:{t:.1,pv:100,n:"Gold"}};
const STAGS=["Breakout","Pullback","Reversal","Scalp","Trend","Range","News","Open Drive","VWAP","Gap Fill","Momentum","Mean Reversion"];
const ETAGS=["Confident","Fearful","Greedy","Patient","Anxious","Calm","FOMO","Revenge","Disciplined","Hesitant"];
const MTAGS=["Early Entry","Late Entry","Moved Stop","No Stop","Over-sized","Under-sized","Chased","Held Too Long","Cut Too Early","No Plan","Emotional","Over-traded"];
function gbs(s){const c=s.replace(/"/g,"").trim(),m=c.match(/^(M2K|MYM|MNQ|MES|RTY|ES|NQ|YM|CL|GC)/i);return m?m[1].toUpperCase():c.replace(/[A-Z]\d$/,"");}
function gsp(s){return TV[gbs(s)]||{t:.25,pv:50,n:s};}
const F=(n,d=2)=>Number(n).toFixed(d),FC=n=>`${n>=0?"+":""}$${Math.abs(n).toFixed(2)}`,FD=d=>new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric"}),FT=d=>new Date(d).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}),FF=d=>new Date(d).toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});
let S={trades:[],view:"dashboard",filter:{symbol:"all",side:"all",result:"all",df:"",dt:"",playbook:"all"},sort:"time",sel:null,showManual:false,journal:{},playbooks:[],showJF:false,showPF:false,editPB:null};
function load(){try{const d=localStorage.getItem("tj-v3");if(d){const p=JSON.parse(d);S.trades=p.trades||[];S.journal=p.journal||{};S.playbooks=p.playbooks||[];}}catch(e){}}
function save(){try{localStorage.setItem("tj-v3",JSON.stringify({trades:S.trades,journal:S.journal,playbooks:S.playbooks}));}catch(e){}}
function parseCSV(text){const lines=text.split("\n");let inC=false,hd=[];const o=[];for(const line of lines){const t=line.trim();if(t==="Completed Orders"){inC=true;continue;}if(!inC||!t||t==="Working Orders")continue;const cols=t.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/).map(c=>c.replace(/^"|"$/g,"").trim());if(cols[0]==="Account"){hd=cols;continue;}if(!hd.length)continue;const row={};hd.forEach((h,i)=>row[h]=cols[i]||"");if(row.Status==="Filled")o.push({side:row["Buy/Sell"],qty:parseInt(row["Qty To Fill"])||0,symbol:row.Symbol,price:parseFloat(row["Avg Fill Price"])||0,time:row["Update Time (FLEST)"]||"",comm:parseFloat(row["Commission Fill Rate"])||0,acct:row.Account||"default"});}return o.sort((a,b)=>new Date(a.time)-new Date(b.time));}
function matchTrades(orders){const byS={};for(const o of orders)(byS[o.symbol]=byS[o.symbol]||[]).push(o);const trades=[];for(const[sym,so]of Object.entries(byS)){const sp=gsp(sym);let pos=[],cs=null;for(const ord of so){if(!cs||!pos.length){cs=ord.side;pos.push({...ord});continue;}if(ord.side===cs){pos.push({...ord});continue;}let cq=ord.qty;const entries=[];let teq=0,tev=0,tc=ord.comm*ord.qty;while(cq>0&&pos.length>0){const e=pos[0];const mq=Math.min(e.qty,cq);entries.push({price:e.price,qty:mq,time:e.time});tev+=e.price*mq;teq+=mq;tc+=e.comm*mq;e.qty-=mq;cq-=mq;if(e.qty===0)pos.shift();}if(teq>0){const ae=tev/teq,ep=ord.price,isL=cs==="B",diff=isL?(ep-ae):(ae-ep),gross=diff*sp.pv*teq;trades.push({id:`${sym}-${entries[0].time}-${ord.time}`,symbol:sym,base:gbs(sym),side:isL?"Long":"Short",qty:teq,avgE:ae,avgX:ep,entries,xTime:ord.time,eTime:entries[0].time,gross,net:gross-tc,comm:tc,diff,ticks:diff/sp.t,tag:"",notes:"",src:"rithmic",rating:0,emotions:[],mistakes:[],sl:null,tp:null,rMultiple:null,screenshot:null,account:ord.acct||"default",playbook:""});}if(cq>0){cs=ord.side;pos=[{...ord,qty:cq}];}else if(!pos.length)cs=null;}}return trades.sort((a,b)=>new Date(a.eTime)-new Date(b.eTime));}
function gft(){let r=[...S.trades];const f=S.filter;if(f.symbol!=="all")r=r.filter(t=>t.base===f.symbol);if(f.side!=="all")r=r.filter(t=>t.side===f.side);if(f.result!=="all")r=r.filter(t=>f.result==="win"?t.net>=0:t.net<0);if(f.df)r=r.filter(t=>t.eTime.split(" ")[0]>=f.df);if(f.dt)r=r.filter(t=>t.eTime.split(" ")[0]<=f.dt);if(f.playbook!=="all")r=r.filter(t=>t.playbook===f.playbook);if(S.sort==="pnl")r.sort((a,b)=>b.net-a.net);else if(S.sort==="rating")r.sort((a,b)=>b.rating-a.rating);else r.sort((a,b)=>new Date(b.eTime)-new Date(a.eTime));return r;}
function gst(tr){if(!tr.length)return null;const w=tr.filter(t=>t.net>=0),l=tr.filter(t=>t.net<0);const tp=tr.reduce((s,t)=>s+t.net,0),tc=tr.reduce((s,t)=>s+t.comm,0);const aw=w.length?w.reduce((s,t)=>s+t.net,0)/w.length:0,al=l.length?l.reduce((s,t)=>s+t.net,0)/l.length:0;const pf=l.length&&al?Math.abs(aw*w.length)/Math.abs(al*l.length):0;const at=tr.reduce((s,t)=>s+t.ticks,0)/tr.length;let eq=0;const curve=tr.map(t=>{eq+=t.net;return eq;});let me=0,md=0;for(const e of curve){me=Math.max(me,e);md=Math.min(md,e-me);}let cs=0,ms=0,cls=0,mls=0;for(const t of tr){if(t.net>=0){cs++;cls=0;ms=Math.max(ms,cs);}else{cls++;cs=0;mls=Math.max(mls,cls);}}const wr=w.length/tr.length;const score=Math.round(Math.min(100,Math.max(0,wr*40+(pf>1?Math.min(pf,3)/3*25:0)+(tr.length>=10?15:tr.length*1.5)+(at>0?Math.min(at/10,1)*20:0))));return{total:tr.length,wins:w.length,losses:l.length,wr:wr*100,tp,tc,aw,al,pf,at,md,curve,lw:w.length?Math.max(...w.map(t=>t.net)):0,ll:l.length?Math.min(...l.map(t=>t.net)):0,ms,mls,score};}
function gsyms(){return[...new Set(S.trades.map(t=>t.base))];}
function byHour(tr){const h={};tr.forEach(t=>{const hr=new Date(t.eTime).getHours();if(!h[hr])h[hr]={pnl:0,n:0,w:0};h[hr].pnl+=t.net;h[hr].n++;if(t.net>=0)h[hr].w++;});return h;}
function byDOW(tr){const d={};const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];tr.forEach(t=>{const day=days[new Date(t.eTime).getDay()];if(!d[day])d[day]={pnl:0,n:0,w:0};d[day].pnl+=t.net;d[day].n++;if(t.net>=0)d[day].w++;});return d;}
function byKey(tr,key){const m={};tr.forEach(t=>{const k=t[key]||"None";if(!m[k])m[k]={pnl:0,n:0,w:0};m[k].pnl+=t.net;m[k].n++;if(t.net>=0)m[k].w++;});return m;}
function byArr(tr,key){const m={};tr.forEach(t=>{(t[key]||[]).forEach(v=>{if(!m[v])m[v]={pnl:0,n:0,w:0};m[v].pnl+=t.net;m[v].n++;if(t.net>=0)m[v].w++;});});return m;}

function R(){document.getElementById("app").innerHTML=rHdr()+'<div class="ctr">'+rContent()+'</div>'+rModals();bindAll();}
function rHdr(){return`<div class="hdr"><div class="hdr-l"><div class="logo">Trading Journal</div><div class="nav">${["dashboard","trades","reports","calendar","journal","playbook"].map(v=>`<button class="nb ${S.view===v?"a":""}" data-v="${v}">${v}</button>`).join("")}</div></div><div class="hdr-r">${S.trades.length?`<button class="btn btn-g" data-a="export">Export</button>`:""}<button class="btn btn-p" data-a="manual">+ Trade</button><input type="file" id="csv" accept=".csv" style="display:none"><button class="btn btn-b" data-a="import">Import CSV</button>${S.trades.length?`<button class="btn btn-r" data-a="clear">Clear</button>`:""}</div></div>`;}
function rContent(){if(!S.trades.length&&S.view!=="journal"&&S.view!=="playbook")return`<div class="empty"><div style="font-size:50px;margin-bottom:18px;opacity:0.5">📊</div><div style="font-size:24px;font-weight:700;margin-bottom:10px">Your Trading Journal</div><div style="font-size:14px;color:var(--text3);max-width:360px;margin:0 auto 24px;line-height:1.5">Import from R|Trader or add trades manually. Free forever.</div><div style="display:flex;gap:10px;justify-content:center"><button class="btn btn-b" data-a="import" style="padding:10px 24px">Import CSV</button><button class="btn btn-p" data-a="manual" style="padding:10px 24px">+ Add Trade</button></div></div>`;switch(S.view){case"dashboard":return rDash();case"trades":return rTrades();case"reports":return rReports();case"calendar":return rCal();case"journal":return rJournal();case"playbook":return rPlaybook();}return"";}
function rDash(){const s=gst(S.trades);if(!s)return"";return rScore(s)+rStats(s)+rEquity(s)+`<div class="g2">`+rSymB()+rStreaks(s)+`</div>`;}
function rScore(s){const c=s.score>=70?"var(--green)":s.score>=40?"var(--orange)":"var(--red)";const pct=s.score/100*226;return`<div class="cd" style="display:flex;align-items:center;gap:24px"><div class="scr"><svg width="80" height="80" viewBox="0 0 80 80"><circle cx="40" cy="40" r="36" fill="none" stroke="var(--border)" stroke-width="6"/><circle cx="40" cy="40" r="36" fill="none" stroke="${c}" stroke-width="6" stroke-dasharray="${pct} 226" stroke-linecap="round"/></svg><div class="scr-n" style="color:${c}">${s.score}</div></div><div><div style="font-size:17px;font-weight:700;margin-bottom:4px">Performance Score</div><div style="font-size:12px;color:var(--text3);line-height:1.5">Based on win rate, profit factor, consistency & avg ticks.<br>${s.score>=70?"Strong performance!":s.score>=40?"Room to improve — check reports.":"Focus on discipline & risk management."}</div></div></div>`;}
function rStats(s){const c=(l,v,cl,sub)=>`<div class="sc"><div class="sl_c">${l}</div><div class="sv ${cl||""}">${v}</div>${sub?`<div class="ss_c">${sub}</div>`:""}</div>`;return`<div class="sr">${c("Net P&L",FC(s.tp),s.tp>=0?"g":"r",s.total+" trades")}${c("Win Rate",F(s.wr,1)+"%",s.wr>=50?"g":"r",s.wins+"W / "+s.losses+"L")}${c("Profit Factor",F(s.pf,2),s.pf>=1?"g":"r")}${c("Avg Win",FC(s.aw),"g")}${c("Avg Loss",FC(s.al),"r")}</div><div class="sr">${c("Largest Win",FC(s.lw),"g")}${c("Largest Loss",FC(s.ll),"r")}${c("Avg Ticks",F(s.at,1),s.at>=0?"g":"r")}${c("Max Drawdown",FC(s.md),"r")}${c("Commissions","$"+F(s.tc,2))}</div>`;}
function rEquity(s){const p=s.curve;if(p.length<2)return"";const mn=Math.min(0,...p),mx=Math.max(0,...p),rg=mx-mn||1;const w=Math.max(p.length*6,200);const tX=i=>(i/(p.length-1))*w;const tY=v=>105-((v-mn)/rg)*95;const zY=tY(0);const path=p.map((v,i)=>`${i===0?"M":"L"}${tX(i)},${tY(v)}`).join(" ");const area=`${path} L${tX(p.length-1)},${zY} L${tX(0)},${zY} Z`;const last=p[p.length-1];const cl=last>=0?"#34c759":"#ff453a";return`<div class="cd"><div class="ct">Equity Curve</div><svg viewBox="0 0 ${w} 110" class="eq-svg"><defs><linearGradient id="eg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${cl}" stop-opacity="0.2"/><stop offset="100%" stop-color="${cl}" stop-opacity="0"/></linearGradient></defs><line x1="0" y1="${zY}" x2="${w}" y2="${zY}" stroke="rgba(255,255,255,0.06)" stroke-width="1"/><path d="${area}" fill="url(#eg)"/><path d="${path}" fill="none" stroke="${cl}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${tX(p.length-1)}" cy="${tY(last)}" r="3" fill="${cl}"/></svg></div>`;}
function rSymB(){const rows=gsyms().map(sym=>{const st=S.trades.filter(t=>t.base===sym);const pnl=st.reduce((s,t)=>s+t.net,0);const wr=st.filter(t=>t.net>=0).length/st.length*100;return`<div class="sym-r"><div><span style="font-weight:600;margin-right:10px">${sym}</span><span style="font-size:11px;color:var(--text3)">${st.length}t · ${F(wr,0)}%WR</span></div><div style="font-weight:700" class="tn ${pnl>=0?"g":"r"}">${FC(pnl)}</div></div>`;}).join("");return`<div class="cd"><div class="ct">By Instrument</div>${rows}</div>`;}
function rStreaks(s){return`<div class="cd"><div class="ct">Streaks</div><div class="g2"><div class="di"><div class="dl">Best Win Streak</div><div class="dv g">${s.ms}</div></div><div class="di"><div class="dl">Worst Loss Streak</div><div class="dv r">${s.mls}</div></div></div></div>`;}
function rTrades(){const ft=gft();return rFilters(ft.length)+rTable(ft);}
function rFilters(count){const syms=gsyms();const pbs=S.playbooks.map(p=>p.name);return`<div class="fl_c"><select class="fs_c" data-f="symbol"><option value="all">All Symbols</option>${syms.map(s=>`<option value="${s}" ${S.filter.symbol===s?"selected":""}>${s}</option>`).join("")}</select><select class="fs_c" data-f="side"><option value="all">All Sides</option><option value="Long" ${S.filter.side==="Long"?"selected":""}>Long</option><option value="Short" ${S.filter.side==="Short"?"selected":""}>Short</option></select><select class="fs_c" data-f="result"><option value="all">All</option><option value="win" ${S.filter.result==="win"?"selected":""}>Winners</option><option value="loss" ${S.filter.result==="loss"?"selected":""}>Losers</option></select><select class="fs_c" data-f="playbook"><option value="all">All Playbooks</option>${pbs.map(p=>`<option value="${p}" ${S.filter.playbook===p?"selected":""}>${p}</option>`).join("")}</select><select class="fs_c" data-f="sort"><option value="time" ${S.sort==="time"?"selected":""}>Time</option><option value="pnl" ${S.sort==="pnl"?"selected":""}>P&L</option><option value="rating" ${S.sort==="rating"?"selected":""}>Rating</option></select><input type="date" class="fi_c" data-f="df" value="${S.filter.df}"><input type="date" class="fi_c" data-f="dt" value="${S.filter.dt}"><div style="margin-left:auto;font-size:12px;color:var(--text3)">${count} trades</div></div>`;}
function rTable(trades){const rows=trades.map(t=>{const w=t.net>=0;const st='★'.repeat(t.rating)+'☆'.repeat(5-t.rating);return`<div class="trow" data-t="${t.id}"><div><div style="font-size:12px;font-weight:600">${FT(t.eTime)}</div><div style="font-size:10px;color:var(--text3)">${FD(t.xTime)}</div></div><div><div style="font-size:12px;font-weight:600">${t.base}</div><div style="font-size:10px;color:var(--text3)">${t.qty}ct</div></div><div class="sbdg ${t.side==="Long"?"sbl":"sbs"}">${t.side}</div><div class="hm tn" style="font-size:12px">${F(t.avgE)}</div><div class="hm tn" style="font-size:12px">${F(t.avgX)}</div><div style="font-size:13px;font-weight:700" class="tn ${w?"g":"r"}">${FC(t.net)}</div><div class="hm tn" style="font-size:11px;color:var(--text3)">${F(t.ticks,1)}t</div><div class="hm" style="font-size:11px;color:var(--yellow)">${st}</div><div class="hm">${t.tag?`<span class="tgb">${t.tag}</span>`:""}${t.playbook?`<span class="tgb" style="background:rgba(10,132,255,0.12);color:var(--blue)">${t.playbook}</span>`:""}</div><div style="font-size:14px;color:var(--text3)">›</div></div>`;}).join("");return`<div class="cd" style="padding:0;overflow:hidden"><div class="th-h"><div class="th">Time</div><div class="th">Symbol</div><div class="th">Side</div><div class="th hm">Entry</div><div class="th hm">Exit</div><div class="th">P&L</div><div class="th hm">Ticks</div><div class="th hm">Rating</div><div class="th hm">Tags</div><div class="th"></div></div><div style="max-height:70vh;overflow-y:auto">${rows}</div></div>`;}
function rReports(){if(!S.trades.length)return"<div class='empty'>Import trades to see reports</div>";return`<div class="g2">${rBR("P&L by Hour",byHour(S.trades),"hour")}${rBR("P&L by Day",byDOW(S.trades),"dow")}</div><div class="g2">${rBR("By Strategy",byKey(S.trades,"tag"),"tag")}${rBR("By Playbook",byKey(S.trades,"playbook"),"pb")}</div><div class="g2">${rBR("By Emotion",byArr(S.trades,"emotions"),"emo")}${rBR("Mistakes Impact",byArr(S.trades,"mistakes"),"mis")}</div>${rRM()}`;}
function rBR(title,data,type){const keys=type==="hour"?Object.keys(data).sort((a,b)=>a-b):type==="dow"?["Mon","Tue","Wed","Thu","Fri"].filter(d=>data[d]):Object.keys(data).sort((a,b)=>(data[b]?.pnl||0)-(data[a]?.pnl||0));if(!keys.length)return`<div class="cd"><div class="ct">${title}</div><div style="font-size:12px;color:var(--text3)">No data</div></div>`;const maxP=Math.max(...keys.map(k=>Math.abs(data[k]?.pnl||0)),1);const bars=keys.map(k=>{const d=data[k];if(!d)return"";const pct=Math.abs(d.pnl)/maxP*100;const col=d.pnl>=0?"var(--green)":"var(--red)";const label=type==="hour"?`${k}:00`:k;return`<div class="rbar"><div class="rbar-l">${label}</div><div style="flex:1"><div class="rbar-f" style="width:${Math.max(pct,4)}%;background:${col}">${d.n}t</div></div><div class="rbar-v ${d.pnl>=0?"g":"r"}">${FC(d.pnl)}</div></div>`;}).join("");return`<div class="cd"><div class="ct">${title}</div>${bars}</div>`;}
function rRM(){const withR=S.trades.filter(t=>t.rMultiple!==null);if(!withR.length)return`<div class="cd"><div class="ct">R-Multiple</div><div style="font-size:12px;color:var(--text3)">Add stop losses to trades to see R-multiple analysis.</div></div>`;const buckets={"< -2R":0,"-2R to -1R":0,"-1R to 0":0,"0 to 1R":0,"1R to 2R":0,"2R+":0};withR.forEach(t=>{const r=t.rMultiple;if(r<-2)buckets["< -2R"]++;else if(r<-1)buckets["-2R to -1R"]++;else if(r<0)buckets["-1R to 0"]++;else if(r<1)buckets["0 to 1R"]++;else if(r<2)buckets["1R to 2R"]++;else buckets["2R+"]++;});const maxB=Math.max(...Object.values(buckets),1);const avgR=withR.reduce((s,t)=>s+t.rMultiple,0)/withR.length;const bars=Object.entries(buckets).map(([k,v])=>{const col=k.includes("-")?"var(--red)":"var(--green)";return`<div class="rbar"><div class="rbar-l">${k}</div><div style="flex:1"><div class="rbar-f" style="width:${Math.max(v/maxB*100,4)}%;background:${col}">${v}</div></div><div class="rbar-v">${v}t</div></div>`;}).join("");return`<div class="cd"><div class="ct">R-Multiple <span style="font-size:12px;color:var(--text3);margin-left:8px">Avg: ${F(avgR,2)}R</span></div>${bars}</div>`;}
function rCal(){const dp={};for(const t of S.trades){const day=t.xTime.split(" ")[0];if(!dp[day])dp[day]={pnl:0,n:0,w:0};dp[day].pnl+=t.net;dp[day].n++;if(t.net>0)dp[day].w++;}const dates=Object.keys(dp).sort();if(!dates.length)return"No trades";const first=new Date(dates[0]+"T00:00:00"),last=new Date(dates[dates.length-1]+"T00:00:00");const ms=new Date(first.getFullYear(),first.getMonth(),1),me=new Date(last.getFullYear(),last.getMonth()+1,0);const pad=ms.getDay(),maxP=Math.max(...Object.values(dp).map(d=>Math.abs(d.pnl)),1);let cells="";["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(d=>{cells+=`<div class="chd">${d}</div>`;});for(let i=0;i<pad;i++)cells+="<div></div>";for(let d=new Date(ms);d<=me;d.setDate(d.getDate()+1)){const key=d.toISOString().split("T")[0];const data=dp[key];const int=data?Math.min(Math.abs(data.pnl)/maxP,1):0;const bg=!data?"var(--bg)":data.pnl>=0?`rgba(52,199,89,${.08+int*.35})`:`rgba(255,69,58,${.08+int*.35})`;const bdr=!data?"transparent":data.pnl>=0?"rgba(52,199,89,0.15)":"rgba(255,69,58,0.15)";const col=!data?"var(--text3)":data.pnl>=0?"var(--green)":"var(--red)";cells+=`<div class="ccl" style="background:${bg};border:1px solid ${bdr}"><div style="font-size:10px;color:var(--text3)">${d.getDate()}</div>${data?`<div style="font-size:12px;font-weight:700;color:${col};font-variant-numeric:tabular-nums">${data.pnl>=0?"+":""}${F(data.pnl,0)}</div><div style="font-size:8px;color:var(--text3)">${data.n}t</div>`:""}</div>`;}const s=gst(S.trades);return rStats(s)+`<div class="cd"><div class="ct">P&L Calendar</div><div class="cg">${cells}</div></div>`;}
function rJournal(){const dates=Object.keys(S.journal).sort().reverse();const entries=dates.map(d=>{const j=S.journal[d];const dt=S.trades.filter(t=>t.eTime.split(" ")[0]===d);const dp=dt.reduce((s,t)=>s+t.net,0);return`<div class="je"><div style="display:flex;justify-content:space-between;align-items:center"><div style="font-size:13px;font-weight:600">${new Date(d+"T00:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</div>${j.mood?`<span style="font-size:12px">${j.mood}</span>`:""}</div>${j.plan?`<div style="font-size:11px;color:var(--text3);margin-top:6px"><b>Plan:</b> ${esc(j.plan)}</div>`:""}<div style="font-size:12px;color:var(--text2);line-height:1.5;margin-top:6px;white-space:pre-wrap">${esc(j.text)}</div>${j.lessons?`<div style="font-size:11px;color:var(--orange);margin-top:6px">💡 ${esc(j.lessons)}</div>`:""}<div style="display:flex;gap:10px;margin-top:6px;font-size:10px;color:var(--text3)"><span>${dt.length} trades</span>${dt.length?`<span class="${dp>=0?"g":"r"}">${FC(dp)}</span>`:""}</div></div>`;}).join("");return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-size:17px;font-weight:600">Daily Journal</div><button class="btn btn-p" data-a="addjrnl">+ New Entry</button></div>${entries||'<div style="color:var(--text3);text-align:center;padding:40px">No entries yet. Record daily reflections.</div>'}`;}
function rPlaybook(){const cards=S.playbooks.map(p=>{const pt=S.trades.filter(t=>t.playbook===p.name);const pnl=pt.reduce((s,t)=>s+t.net,0);const wr=pt.length?pt.filter(t=>t.net>=0).length/pt.length*100:0;return`<div class="pb-c" data-pb="${p.name}"><div style="font-size:14px;font-weight:700;margin-bottom:3px">${esc(p.name)}</div><div style="font-size:11px;color:var(--text3);line-height:1.4;white-space:pre-wrap">${esc(p.rules||p.entry||"")}</div><div style="display:flex;gap:14px;margin-top:8px;font-size:11px"><span class="${pnl>=0?"g":"r"}">${FC(pnl)}</span><span>${pt.length} trades</span><span>${F(wr,0)}% WR</span></div></div>`;}).join("");return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-size:17px;font-weight:600">Playbook</div><button class="btn btn-p" data-a="addpb">+ Strategy</button></div><div style="font-size:12px;color:var(--text3);margin-bottom:12px">Define strategies & tag trades to track per-strategy performance.</div>${cards||'<div style="color:var(--text3);text-align:center;padding:40px">No playbooks yet.</div>'}`;}

function rDetail(){const t=S.trades.find(tr=>tr.id===S.sel);if(!t)return"";const w=t.net>=0;const dur=Math.round((new Date(t.xTime)-new Date(t.eTime))/60000);const durS=dur<60?`${dur}m`:`${Math.floor(dur/60)}h ${dur%60}m`;const fills=(t.entries||[]).map(e=>`<div style="font-size:12px;color:var(--text2);margin-bottom:3px">${e.qty}ct @ ${F(e.price)} — ${FT(e.time)}</div>`).join("");const stags=STAGS.map(tag=>`<button class="tgs ${t.tag===tag?"a":""}" data-st="${tag}">${tag}</button>`).join("");const etags=ETAGS.map(tag=>`<button class="tgs emo ${(t.emotions||[]).includes(tag)?"a":""}" data-et="${tag}">${tag}</button>`).join("");const mtags=MTAGS.map(tag=>`<button class="tgs mis ${(t.mistakes||[]).includes(tag)?"a":""}" data-mt="${tag}">${tag}</button>`).join("");const pbO=S.playbooks.map(p=>`<option value="${p.name}" ${t.playbook===p.name?"selected":""}>${p.name}</option>`).join("");const starH=Array.from({length:5},(_,i)=>`<span class="star ${i<t.rating?"on":""}" data-r="${i+1}">★</span>`).join("");

function rManForm(){const so=Object.keys(TV).map(s=>`<option value="${s}">${s} — ${TV[s].n}</option>`).join("");const pbO=S.playbooks.map(p=>`<option value="${p.name}">${p.name}</option>`).join("");return`<div class="ov" data-a="cov"><div class="md" onclick="event.stopPropagation()"><div class="md-h"><div style="font-size:16px;font-weight:700">Add Trade</div><button class="md-x" data-a="cman">✕</button></div><div class="md-b"><div class="fg"><div class="ff"><div class="flab">Symbol</div><select id="mSym" class="fin">${so}</select></div><div class="ff"><div class="flab">Side</div><select id="mSide" class="fin"><option value="Long">Long</option><option value="Short">Short</option></select></div><div class="ff"><div class="flab">Contracts</div><input id="mQty" type="number" class="fin" value="1" min="1"></div><div class="ff"><div class="flab">Entry Price</div><input id="mE" type="number" class="fin" step="0.01"></div><div class="ff"><div class="flab">Exit Price</div><input id="mX" type="number" class="fin" step="0.01"></div><div class="ff"><div class="flab">Commission</div><input id="mC" type="number" class="fin" step="0.01" value="0"></div><div class="ff"><div class="flab">Entry Time</div><input id="mET" type="datetime-local" class="fin"></div><div class="ff"><div class="flab">Exit Time</div><input id="mXT" type="datetime-local" class="fin"></div><div class="ff"><div class="flab">Stop Loss</div><input id="mSL" type="number" class="fin" step="0.01" placeholder="Optional"></div><div class="ff"><div class="flab">Take Profit</div><input id="mTP" type="number" class="fin" step="0.01" placeholder="Optional"></div><div class="ff"><div class="flab">Playbook</div><select id="mPB" class="fin"><option value="">None</option>${pbO}</select></div><div class="ff"><div class="flab">Account</div><input id="mA" class="fin" value="default"></div><div class="ff fsp"><div class="flab">Notes</div><textarea id="mN" class="fin" rows="2"></textarea></div></div><div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end"><button class="btn btn-g" data-a="cman">Cancel</button><button class="btn btn-b" data-a="sman">Add Trade</button></div></div></div></div>`;}
function rJF(){const today=new Date().toISOString().split("T")[0];const e=S.journal[today];return`<div class="ov" data-a="cov"><div class="md" onclick="event.stopPropagation()"><div class="md-h"><div style="font-size:16px;font-weight:700">Daily Journal</div><button class="md-x" data-a="cjf">✕</button></div><div class="md-b"><div class="ff" style="margin-bottom:10px"><div class="flab">Date</div><input id="jD" type="date" class="fin" value="${today}"></div><div class="ff" style="margin-bottom:10px"><div class="flab">Mood</div><select id="jM" class="fin"><option value="">Select...</option>${["😀 Great","🙂 Good","😐 Neutral","😞 Bad","😡 Terrible"].map(m=>`<option value="${m}" ${e?.mood===m?"selected":""}>${m}</option>`).join("")}</select></div><div class="ff" style="margin-bottom:10px"><div class="flab">Pre-market Plan</div><textarea id="jP" class="fin" rows="3" placeholder="What's your plan?">${e?.plan||""}</textarea></div><div class="ff" style="margin-bottom:10px"><div class="flab">End-of-day Review</div><textarea id="jT" class="fin" rows="4" placeholder="What went well? What didn't?">${e?.text||""}</textarea></div><div class="ff" style="margin-bottom:10px"><div class="flab">Lessons Learned</div><textarea id="jL" class="fin" rows="2" placeholder="Key takeaways">${e?.lessons||""}</textarea></div><div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-g" data-a="cjf">Cancel</button><button class="btn btn-b" data-a="sjf">Save</button></div></div></div></div>`;}
function rPF(){const e=S.editPB?S.playbooks.find(p=>p.name===S.editPB):null;return`<div class="ov" data-a="cov"><div class="md" onclick="event.stopPropagation()"><div class="md-h"><div style="font-size:16px;font-weight:700">${e?"Edit":"New"} Playbook</div><button class="md-x" data-a="cpf">✕</button></div><div class="md-b"><div class="ff" style="margin-bottom:10px"><div class="flab">Strategy Name</div><input id="pN" class="fin" value="${e?esc(e.name):""}" placeholder="e.g. Break & Retest"></div><div class="ff" style="margin-bottom:10px"><div class="flab">Entry Rules</div><textarea id="pE" class="fin" rows="3" placeholder="When do you enter?">${e?esc(e.entry||""):""}</textarea></div><div class="ff" style="margin-bottom:10px"><div class="flab">Exit Rules</div><textarea id="pX" class="fin" rows="3" placeholder="TP, SL, trail?">${e?esc(e.exit||""):""}</textarea></div><div class="ff" style="margin-bottom:10px"><div class="flab">Notes</div><textarea id="pR" class="fin" rows="3">${e?esc(e.rules||""):""}</textarea></div><div style="display:flex;gap:8px;justify-content:flex-end">${e?`<button class="btn btn-r" data-a="dpb" style="margin-right:auto">Delete</button>`:""}<button class="btn btn-g" data-a="cpf">Cancel</button><button class="btn btn-b" data-a="spf">Save</button></div></div></div></div>`;}
function esc(t){const d=document.createElement("div");d.textContent=t||"";return d.innerHTML;}

function bindAll(){
document.querySelectorAll("[data-v]").forEach(el=>{el.onclick=()=>{S.view=el.dataset.v;R();};});
document.querySelectorAll("[data-a]").forEach(el=>{const a=el.dataset.a;
if(a==="import")el.onclick=()=>document.getElementById("csv").click();
if(a==="clear")el.onclick=()=>{if(confirm("Delete all data?")){S.trades=[];S.journal={};save();R();}};
if(a==="manual")el.onclick=()=>{S.showManual=true;R();};
if(a==="cov"&&el.classList.contains("ov"))el.onclick=e=>{if(e.target===el){S.sel=null;S.showManual=false;S.showJF=false;S.showPF=false;S.editPB=null;R();}};
if(a==="csel")el.onclick=()=>{S.sel=null;R();};if(a==="cman")el.onclick=()=>{S.showManual=false;R();};
if(a==="cjf")el.onclick=()=>{S.showJF=false;R();};if(a==="cpf")el.onclick=()=>{S.showPF=false;S.editPB=null;R();};
if(a==="export")el.onclick=doExport;if(a==="sdet")el.onclick=saveDetail;if(a==="sman")el.onclick=saveManual;
if(a==="sjf")el.onclick=saveJrnl;if(a==="spf")el.onclick=savePB;
if(a==="addjrnl")el.onclick=()=>{S.showJF=true;R();};if(a==="addpb")el.onclick=()=>{S.showPF=true;S.editPB=null;R();};
if(a==="delt")el.onclick=()=>{if(confirm("Delete?")){S.trades=S.trades.filter(t=>t.id!==S.sel);S.sel=null;save();R();}};
if(a==="dpb")el.onclick=()=>{if(confirm("Delete playbook?")){S.playbooks=S.playbooks.filter(p=>p.name!==S.editPB);S.showPF=false;S.editPB=null;save();R();}};});
const ci=document.getElementById("csv");if(ci)ci.onchange=doImport;
document.querySelectorAll("[data-f]").forEach(el=>{el.onchange=()=>{const f=el.dataset.f;if(f==="sort")S.sort=el.value;else if(f==="df")S.filter.df=el.value;else if(f==="dt")S.filter.dt=el.value;else S.filter[f]=el.value;R();};});
document.querySelectorAll("[data-t]").forEach(el=>{el.onclick=()=>{S.sel=el.dataset.t;R();};});
document.querySelectorAll("[data-pb]").forEach(el=>{el.onclick=()=>{S.editPB=el.dataset.pb;S.showPF=true;R();};});
document.querySelectorAll("[data-st]").forEach(el=>{el.onclick=()=>{const t=S.trades.find(tr=>tr.id===S.sel);if(t){t.tag=t.tag===el.dataset.st?"":el.dataset.st;save();R();}};});
document.querySelectorAll("[data-et]").forEach(el=>{el.onclick=()=>{const t=S.trades.find(tr=>tr.id===S.sel);if(t){if(!t.emotions)t.emotions=[];const i=t.emotions.indexOf(el.dataset.et);if(i>=0)t.emotions.splice(i,1);else t.emotions.push(el.dataset.et);save();R();}};});
document.querySelectorAll("[data-mt]").forEach(el=>{el.onclick=()=>{const t=S.trades.find(tr=>tr.id===S.sel);if(t){if(!t.mistakes)t.mistakes=[];const i=t.mistakes.indexOf(el.dataset.mt);if(i>=0)t.mistakes.splice(i,1);else t.mistakes.push(el.dataset.mt);save();R();}};});
document.querySelectorAll("[data-r]").forEach(el=>{el.onclick=()=>{const t=S.trades.find(tr=>tr.id===S.sel);if(t){t.rating=parseInt(el.dataset.r);save();R();}};});
const ss=document.getElementById("dSS");if(ss)ss.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{const t=S.trades.find(tr=>tr.id===S.sel);if(t){t.screenshot=ev.target.result;save();R();}};r.readAsDataURL(f);};}

function doImport(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{const o=parseCSV(ev.target.result);const m=matchTrades(o);const ex=new Set(S.trades.map(t=>t.id));const n=m.filter(t=>!ex.has(t.id));if(n.length){S.trades=[...S.trades,...n].sort((a,b)=>new Date(a.eTime)-new Date(b.eTime));save();}R();};r.readAsText(f);e.target.value="";}
function saveDetail(){const t=S.trades.find(tr=>tr.id===S.sel);if(!t)return;const n=document.getElementById("dNotes");if(n)t.notes=n.value;const sl=document.getElementById("dSL");if(sl)t.sl=sl.value?parseFloat(sl.value):null;const tp=document.getElementById("dTP");if(tp)t.tp=tp.value?parseFloat(tp.value):null;const pb=document.getElementById("dPB");if(pb)t.playbook=pb.value;if(t.sl){const sp=gsp(t.symbol);const risk=Math.abs(t.avgE-t.sl)*sp.pv*t.qty;if(risk>0)t.rMultiple=t.net/risk;}save();S.sel=null;R();}
function saveManual(){const sym=document.getElementById("mSym").value,side=document.getElementById("mSide").value,qty=parseInt(document.getElementById("mQty").value)||1,entry=parseFloat(document.getElementById("mE").value),exit=parseFloat(document.getElementById("mX").value),comm=parseFloat(document.getElementById("mC").value)||0,et=document.getElementById("mET").value,xt=document.getElementById("mXT").value,sl=document.getElementById("mSL").value,tp=document.getElementById("mTP").value,pb=document.getElementById("mPB").value,acct=document.getElementById("mA").value,notes=document.getElementById("mN").value;if(!entry||!exit||!et||!xt){alert("Fill prices and times.");return;}const sp=TV[sym]||{t:.25,pv:50};const isL=side==="Long";const diff=isL?(exit-entry):(entry-exit);const gross=diff*sp.pv*qty;const eT=et.replace("T"," "),xT=xt.replace("T"," ");const trade={id:`m-${Date.now()}-${Math.random().toString(36).slice(2,7)}`,symbol:sym,base:sym,side,qty,avgE:entry,avgX:exit,entries:[{price:entry,qty,time:eT}],eTime:eT,xTime:xT,gross,net:gross-comm,comm,diff,ticks:diff/sp.t,tag:"",notes,src:"manual",rating:0,emotions:[],mistakes:[],sl:sl?parseFloat(sl):null,tp:tp?parseFloat(tp):null,rMultiple:null,screenshot:null,account:acct||"default",playbook:pb};if(trade.sl){const risk=Math.abs(entry-trade.sl)*sp.pv*qty;if(risk>0)trade.rMultiple=trade.net/risk;}S.trades.push(trade);S.trades.sort((a,b)=>new Date(a.eTime)-new Date(b.eTime));save();S.showManual=false;R();}
function saveJrnl(){const d=document.getElementById("jD").value;if(!d)return;S.journal[d]={text:document.getElementById("jT").value,plan:document.getElementById("jP").value,lessons:document.getElementById("jL").value,mood:document.getElementById("jM").value,date:d};save();S.showJF=false;R();}
function savePB(){const name=document.getElementById("pN").value.trim();if(!name){alert("Name required.");return;}const pb={name,entry:document.getElementById("pE").value,exit:document.getElementById("pX").value,rules:document.getElementById("pR").value};if(S.editPB){const i=S.playbooks.findIndex(p=>p.name===S.editPB);if(i>=0){S.trades.forEach(t=>{if(t.playbook===S.editPB)t.playbook=name;});S.playbooks[i]=pb;}}else S.playbooks.push(pb);save();S.showPF=false;S.editPB=null;R();}
function doExport(){const h=["Date","Symbol","Side","Qty","Entry","Exit","Gross","Comm","Net","Ticks","Rating","Tag","Playbook","Emotions","Mistakes","Notes"];const rows=S.trades.map(t=>[t.eTime,t.base,t.side,t.qty,t.avgE,t.avgX,F(t.gross),F(t.comm),F(t.net),F(t.ticks,1),t.rating,t.tag,t.playbook,(t.emotions||[]).join(";"),(t.mistakes||[]).join(";"),`"${(t.notes||"").replace(/"/g,'""')}"`]);const csv=[h.join(","),...rows.map(r=>r.join(","))].join("\n");const blob=new Blob([csv],{type:"text/csv"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`journal-${new Date().toISOString().split("T")[0]}.csv`;a.click();}
load();R();
</script>
</body>
</html>
